spring.application.name=phd-progress
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/phd_progress}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Pradeep@184}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jackson.default-property-inclusion=non_null

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

security.jwt.secret=${JWT_SECRET:change-me-change-me-change-me-change-me-change-me}
security.jwt.expiration=3600000

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.storage.root=${APP_STORAGE_ROOT:uploads}

# Local development defaults work well with MailHog/Mailpit on localhost:1025.
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}
app.mail.from=${APP_MAIL_FROM:no-reply@phd-progress.local}
app.seed.default-users=${APP_SEED_DEFAULT_USERS:true}
